# omnetpp.ini — single authoritative config file
# All training and realtime configs live here.
# Run command:
#   cd netsim_project
#   truncate -s 0 results/congestion_stream.jsonl
#   truncate -s 0 results/portscan_stream.jsonl
#   ./netsim -f configs/omnetpp.ini -c <ConfigName> -u Cmdenv

[General]
include base.ini

# ════════════════════════════════════════════════════════════════════════════
# TRAINING CONFIGS  — fast, batch, dense labels, 2-hour simulated time
# Each run produces ~720 records per router node (10s interval × 7200s)
# × 6 routers + 4 observers = 7200 records per run
#
# Label distributions per 7200s run (congestion):
#   label=0 (normal)    ~4400 records  (~61%)
#   label=1 queue        ~720 records  (~10%)
#   label=2 incast       ~360 records  (~5%)
#   label=3 burst        ~540 records  (~7.5%)
#   label=4 periodic     ~720 records  (~10%)
#   label=5 link_fail    ~360 records  (~5%)
#
# Port scan labels per 7200s run:
#   label=0 normal      ~4200 records
#   label=1–5 scans     ~3000 records total (balanced across types)
# ════════════════════════════════════════════════════════════════════════════

[Config Training_Normal]
description = "Normal baseline traffic only — label 0 throughout"
*.numHostsPerLan = 5
*.dataExporter.scenarioName    = "training_normal"
*.dataExporter.congestionLabel = 0
*.dataExporter.scanLabel       = 0
*.scenarioManager.script       = xmldoc("../xml/scenario_normal.xml")
cmdenv-express-mode            = true
sim-time-limit                 = 7200s
output-scalar-file             = results/Training_Normal.sca
output-vector-file             = results/Training_Normal.vec

[Config Training_Congestion]
description = "Congestion training — 6 repeating cycles, 5 event types, labels 1-5"
*.numHostsPerLan = 5
*.dataExporter.scenarioName    = "training_congestion"
*.dataExporter.congestionLabel = 0
*.dataExporter.scanLabel       = 0
*.scenarioManager.script       = xmldoc("../xml/scenario_congestion.xml")
cmdenv-express-mode            = true
sim-time-limit                 = 7200s
output-scalar-file             = results/Training_Congestion.sca
output-vector-file             = results/Training_Congestion.vec

[Config Training_PortScan]
description = "Port scan training — 6 repeating cycles, 5 scan types, labels 1-5"
*.numHostsPerLan = 5
*.dataExporter.scenarioName    = "training_portscan"
*.dataExporter.congestionLabel = 0
*.dataExporter.scanLabel       = 0
*.scenarioManager.script       = xmldoc("../xml/scenario_portscan.xml")
cmdenv-express-mode            = true
sim-time-limit                 = 7200s
output-scalar-file             = results/Training_PortScan.sca
output-vector-file             = results/Training_PortScan.vec
# attacker fires continuously — scan types distinguished by label windows only
*.isp_private0.private.attacker.numApps = 5
*.isp_private0.private.attacker.app[*].typename      = "UdpBasicApp"
*.isp_private0.private.attacker.app[*].messageLength = 40B
*.isp_private0.private.attacker.app[0].destAddresses = "cloud.webServer"
*.isp_private0.private.attacker.app[0].destPort      = 80
*.isp_private0.private.attacker.app[0].sendInterval  = exponential(2ms)
*.isp_private0.private.attacker.app[0].startTime     = 60s
*.isp_private0.private.attacker.app[1].destAddresses = "cloud.videoServer"
*.isp_private0.private.attacker.app[1].destPort      = 443
*.isp_private0.private.attacker.app[1].sendInterval  = exponential(3ms)
*.isp_private0.private.attacker.app[1].startTime     = 60s
*.isp_private0.private.attacker.app[2].destAddresses = "cloud.fileServer"
*.isp_private0.private.attacker.app[2].destPort      = 22
*.isp_private0.private.attacker.app[2].sendInterval  = exponential(4ms)
*.isp_private0.private.attacker.app[2].startTime     = 60s
*.isp_private0.private.attacker.app[3].destAddresses = "cloud.gameServer"
*.isp_private0.private.attacker.app[3].destPort      = 3306
*.isp_private0.private.attacker.app[3].sendInterval  = exponential(5ms)
*.isp_private0.private.attacker.app[3].startTime     = 60s
*.isp_private0.private.attacker.app[4].destAddresses = "cloud.voipServer"
*.isp_private0.private.attacker.app[4].destPort      = 8080
*.isp_private0.private.attacker.app[4].sendInterval  = exponential(6ms)
*.isp_private0.private.attacker.app[4].startTime     = 60s


[Config Training_Mixed]
description = "Mixed: congestion + scan simultaneously — tests co-occurrence"
*.numHostsPerLan = 5
*.dataExporter.scenarioName    = "training_mixed"
*.dataExporter.congestionLabel = 0
*.dataExporter.scanLabel       = 0
# Use congestion script — scan fires from attacker simultaneously
*.scenarioManager.script       = xmldoc("../xml/scenario_congestion.xml")
cmdenv-express-mode            = true
sim-time-limit                 = 7200s
output-scalar-file             = results/Training_Mixed.sca
output-vector-file             = results/Training_Mixed.vec

