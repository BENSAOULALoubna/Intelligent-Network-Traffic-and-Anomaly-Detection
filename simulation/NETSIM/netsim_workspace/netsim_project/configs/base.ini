[General]
network = NetworkTopology
ned-path = ..:../src:../../inet-4.5.2/src
cmdenv-express-mode = true

# ── disable OMNeT++ result files — DataExporter handles all output ──────────
**.scalar-recording = false
**.vector-recording = false
**.result-recording-modes = -

# ── routing ─────────────────────────────────────────────────────────────────
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true
*.configurator.optimizeRoutes   = false

# ── OSPF on all routers ──────────────────────────────────────────────────────
*.boundary.hasOspf                      = true
*.core0.hasOspf                         = true
*.core1.hasOspf                         = true
*.core2.hasOspf                         = true
*.edge0.hasOspf                         = true
*.edge1.hasOspf                         = true
*.isp_mobile0.mobile.gateway.hasOspf   = true
*.isp_ftth0.ftth.gateway.hasOspf       = true
*.isp_mobile1.mobile.gateway.hasOspf   = true
*.isp_private0.private.gateway.hasOspf = true
*.cloud.cloudGateway.hasOspf           = true

# ── DataExporter defaults ────────────────────────────────────────────────────
*.dataExporter.collectionInterval  = 10s
*.dataExporter.congestionFile      = "results/congestion_stream.jsonl"
*.dataExporter.portscanFile        = "results/portscan_stream.jsonl"
*.dataExporter.scenarioName        = "normal"
*.dataExporter.congestionLabel     = 0
*.dataExporter.scanLabel           = 0
*.dataExporter.coreCapacityMbps    = 10000.0
*.dataExporter.edgeCapacityMbps    = 1000.0

# ── OSPF convergence: apps start after routing settles ───────────────────────
*.isp_mobile0.mobile.host[*].app[*].reconnectInterval  = 30s
*.isp_mobile1.mobile.host[*].app[*].reconnectInterval  = 30s
*.isp_ftth0.ftth.host[*].app[*].reconnectInterval      = 30s
*.isp_private0.private.host[*].app[*].reconnectInterval = 30s

# ── Cloud servers ────────────────────────────────────────────────────────────
*.cloud.videoServer.numApps          = 1
*.cloud.videoServer.app[0].typename  = "TcpGenericServerApp"
*.cloud.videoServer.app[0].localPort = 8080
*.cloud.videoServer.app[0].replyDelay = 0s

*.cloud.voipServer.numApps           = 1
*.cloud.voipServer.app[0].typename   = "UdpSink"
*.cloud.voipServer.app[0].localPort  = 5060

*.cloud.webServer.numApps            = 1
*.cloud.webServer.app[0].typename    = "TcpGenericServerApp"
*.cloud.webServer.app[0].localPort   = 80
*.cloud.webServer.app[0].replyDelay  = 0s

*.cloud.fileServer.numApps           = 1
*.cloud.fileServer.app[0].typename   = "TcpGenericServerApp"
*.cloud.fileServer.app[0].localPort  = 21
*.cloud.fileServer.app[0].replyDelay = 0s

*.cloud.gameServer.numApps           = 1
*.cloud.gameServer.app[0].typename   = "UdpSink"
*.cloud.gameServer.app[0].localPort  = 27015

# ── Mobile ISP (mobile0 and mobile1 identical — 4 apps) ─────────────────────
*.isp_mobile0.mobile.host[*].numApps = 4
*.isp_mobile1.mobile.host[*].numApps = 4

*.isp_mobile0.mobile.host[*].app[0].typename      = "UdpBasicApp"
*.isp_mobile0.mobile.host[*].app[0].destAddresses = "cloud.voipServer"
*.isp_mobile0.mobile.host[*].app[0].destPort      = 5060
*.isp_mobile0.mobile.host[*].app[0].messageLength = 160B
*.isp_mobile0.mobile.host[*].app[0].sendInterval  = truncnormal(20ms,4ms)
*.isp_mobile0.mobile.host[*].app[0].startTime     = uniform(60s,150s)
*.isp_mobile0.mobile.host[*].app[0].stopTime      = -1s

*.isp_mobile0.mobile.host[*].app[1].typename               = "TcpBasicClientApp"
*.isp_mobile0.mobile.host[*].app[1].connectAddress         = "cloud.webServer"
*.isp_mobile0.mobile.host[*].app[1].connectPort            = 80
*.isp_mobile0.mobile.host[*].app[1].requestLength          = 1B*int(truncnormal(500,100))
*.isp_mobile0.mobile.host[*].app[1].replyLength            = 1B*int(truncnormal(80000,20000))
*.isp_mobile0.mobile.host[*].app[1].numRequestsPerSession  = intuniform(5,20)
*.isp_mobile0.mobile.host[*].app[1].thinkTime              = exponential(8s)
*.isp_mobile0.mobile.host[*].app[1].idleInterval           = exponential(30s)
*.isp_mobile0.mobile.host[*].app[1].startTime              = uniform(60s,150s)

*.isp_mobile0.mobile.host[*].app[2].typename      = "UdpBasicApp"
*.isp_mobile0.mobile.host[*].app[2].destAddresses = "cloud.webServer"
*.isp_mobile0.mobile.host[*].app[2].destPort      = 443
*.isp_mobile0.mobile.host[*].app[2].messageLength = 200B
*.isp_mobile0.mobile.host[*].app[2].sendInterval  = exponential(5s)
*.isp_mobile0.mobile.host[*].app[2].startTime     = uniform(60s,150s)
*.isp_mobile0.mobile.host[*].app[2].stopTime      = -1s

*.isp_mobile0.mobile.host[*].app[3].typename               = "TcpBasicClientApp"
*.isp_mobile0.mobile.host[*].app[3].connectAddress         = "cloud.videoServer"
*.isp_mobile0.mobile.host[*].app[3].connectPort            = 8080
*.isp_mobile0.mobile.host[*].app[3].requestLength          = 1000B
*.isp_mobile0.mobile.host[*].app[3].replyLength            = 1B*int(truncnormal(500000,100000))
*.isp_mobile0.mobile.host[*].app[3].numRequestsPerSession  = intuniform(2,8)
*.isp_mobile0.mobile.host[*].app[3].thinkTime              = exponential(3s)
*.isp_mobile0.mobile.host[*].app[3].idleInterval           = exponential(45s)
*.isp_mobile0.mobile.host[*].app[3].startTime              = uniform(60s,150s)

*.isp_mobile1.mobile.host[*].app[0].typename      = "UdpBasicApp"
*.isp_mobile1.mobile.host[*].app[0].destAddresses = "cloud.voipServer"
*.isp_mobile1.mobile.host[*].app[0].destPort      = 5060
*.isp_mobile1.mobile.host[*].app[0].messageLength = 160B
*.isp_mobile1.mobile.host[*].app[0].sendInterval  = truncnormal(20ms,4ms)
*.isp_mobile1.mobile.host[*].app[0].startTime     = uniform(60s,150s)
*.isp_mobile1.mobile.host[*].app[0].stopTime      = -1s

*.isp_mobile1.mobile.host[*].app[1].typename               = "TcpBasicClientApp"
*.isp_mobile1.mobile.host[*].app[1].connectAddress         = "cloud.webServer"
*.isp_mobile1.mobile.host[*].app[1].connectPort            = 80
*.isp_mobile1.mobile.host[*].app[1].requestLength          = 1B*int(truncnormal(500,100))
*.isp_mobile1.mobile.host[*].app[1].replyLength            = 1B*int(truncnormal(80000,20000))
*.isp_mobile1.mobile.host[*].app[1].numRequestsPerSession  = intuniform(5,20)
*.isp_mobile1.mobile.host[*].app[1].thinkTime              = exponential(8s)
*.isp_mobile1.mobile.host[*].app[1].idleInterval           = exponential(30s)
*.isp_mobile1.mobile.host[*].app[1].startTime              = uniform(60s,150s)

*.isp_mobile1.mobile.host[*].app[2].typename      = "UdpBasicApp"
*.isp_mobile1.mobile.host[*].app[2].destAddresses = "cloud.webServer"
*.isp_mobile1.mobile.host[*].app[2].destPort      = 443
*.isp_mobile1.mobile.host[*].app[2].messageLength = 200B
*.isp_mobile1.mobile.host[*].app[2].sendInterval  = exponential(5s)
*.isp_mobile1.mobile.host[*].app[2].startTime     = uniform(60s,150s)
*.isp_mobile1.mobile.host[*].app[2].stopTime      = -1s

*.isp_mobile1.mobile.host[*].app[3].typename               = "TcpBasicClientApp"
*.isp_mobile1.mobile.host[*].app[3].connectAddress         = "cloud.videoServer"
*.isp_mobile1.mobile.host[*].app[3].connectPort            = 8080
*.isp_mobile1.mobile.host[*].app[3].requestLength          = 1000B
*.isp_mobile1.mobile.host[*].app[3].replyLength            = 1B*int(truncnormal(500000,100000))
*.isp_mobile1.mobile.host[*].app[3].numRequestsPerSession  = intuniform(2,8)
*.isp_mobile1.mobile.host[*].app[3].thinkTime              = exponential(3s)
*.isp_mobile1.mobile.host[*].app[3].idleInterval           = exponential(45s)
*.isp_mobile1.mobile.host[*].app[3].startTime              = uniform(60s,150s)

# ── FTTH heavy traffic (4 apps) ──────────────────────────────────────────────
*.isp_ftth0.ftth.host[*].numApps = 4

*.isp_ftth0.ftth.host[*].app[0].typename               = "TcpBasicClientApp"
*.isp_ftth0.ftth.host[*].app[0].connectAddress         = "cloud.videoServer"
*.isp_ftth0.ftth.host[*].app[0].connectPort            = 8080
*.isp_ftth0.ftth.host[*].app[0].requestLength          = 1000B
*.isp_ftth0.ftth.host[*].app[0].replyLength            = 1B*int(truncnormal(3000000,600000))
*.isp_ftth0.ftth.host[*].app[0].numRequestsPerSession  = intuniform(5,20)
*.isp_ftth0.ftth.host[*].app[0].thinkTime              = exponential(1s)
*.isp_ftth0.ftth.host[*].app[0].idleInterval           = exponential(30s)
*.isp_ftth0.ftth.host[*].app[0].startTime              = uniform(60s,150s)

*.isp_ftth0.ftth.host[*].app[1].typename      = "UdpBasicApp"
*.isp_ftth0.ftth.host[*].app[1].destAddresses = "cloud.gameServer"
*.isp_ftth0.ftth.host[*].app[1].destPort      = 27015
*.isp_ftth0.ftth.host[*].app[1].messageLength = 120B
*.isp_ftth0.ftth.host[*].app[1].sendInterval  = truncnormal(33ms,5ms)
*.isp_ftth0.ftth.host[*].app[1].startTime     = uniform(60s,150s)
*.isp_ftth0.ftth.host[*].app[1].stopTime      = -1s

*.isp_ftth0.ftth.host[*].app[2].typename               = "TcpBasicClientApp"
*.isp_ftth0.ftth.host[*].app[2].connectAddress         = "cloud.fileServer"
*.isp_ftth0.ftth.host[*].app[2].connectPort            = 21
*.isp_ftth0.ftth.host[*].app[2].requestLength          = 500B
*.isp_ftth0.ftth.host[*].app[2].replyLength            = 1B*int(truncnormal(15000000,3000000))
*.isp_ftth0.ftth.host[*].app[2].numRequestsPerSession  = intuniform(1,4)
*.isp_ftth0.ftth.host[*].app[2].thinkTime              = exponential(5s)
*.isp_ftth0.ftth.host[*].app[2].idleInterval           = exponential(120s)
*.isp_ftth0.ftth.host[*].app[2].startTime              = uniform(120s,150s)

*.isp_ftth0.ftth.host[*].app[3].typename      = "UdpBasicApp"
*.isp_ftth0.ftth.host[*].app[3].destAddresses = "cloud.webServer"
*.isp_ftth0.ftth.host[*].app[3].destPort      = 53
*.isp_ftth0.ftth.host[*].app[3].messageLength = 64B
*.isp_ftth0.ftth.host[*].app[3].sendInterval  = exponential(10s)
*.isp_ftth0.ftth.host[*].app[3].startTime     = uniform(60s,150s)
*.isp_ftth0.ftth.host[*].app[3].stopTime      = -1s

# ── Private/Enterprise traffic (4 apps) ─────────────────────────────────────
*.isp_private0.private.host[*].numApps = 4

*.isp_private0.private.host[*].app[0].typename               = "TcpBasicClientApp"
*.isp_private0.private.host[*].app[0].connectAddress         = "cloud.webServer"
*.isp_private0.private.host[*].app[0].connectPort            = 3306
*.isp_private0.private.host[*].app[0].requestLength          = 1B*int(truncnormal(2000,400))
*.isp_private0.private.host[*].app[0].replyLength            = 1B*int(truncnormal(20000,5000))
*.isp_private0.private.host[*].app[0].numRequestsPerSession  = intuniform(10,50)
*.isp_private0.private.host[*].app[0].thinkTime              = exponential(0.5s)
*.isp_private0.private.host[*].app[0].idleInterval           = exponential(8s)
*.isp_private0.private.host[*].app[0].startTime              = uniform(60s,150s)

*.isp_private0.private.host[*].app[1].typename               = "TcpBasicClientApp"
*.isp_private0.private.host[*].app[1].connectAddress         = "cloud.webServer"
*.isp_private0.private.host[*].app[1].connectPort            = 25
*.isp_private0.private.host[*].app[1].requestLength          = 1B*int(truncnormal(8000,2000))
*.isp_private0.private.host[*].app[1].replyLength            = 1B*int(truncnormal(3000,1000))
*.isp_private0.private.host[*].app[1].numRequestsPerSession  = intuniform(1,5)
*.isp_private0.private.host[*].app[1].thinkTime              = exponential(60s)
*.isp_private0.private.host[*].app[1].idleInterval           = exponential(300s)
*.isp_private0.private.host[*].app[1].startTime              = uniform(60s,150s)

*.isp_private0.private.host[*].app[2].typename               = "TcpBasicClientApp"
*.isp_private0.private.host[*].app[2].connectAddress         = "cloud.fileServer"
*.isp_private0.private.host[*].app[2].connectPort            = 445
*.isp_private0.private.host[*].app[2].requestLength          = 1B*int(truncnormal(2000,400))
*.isp_private0.private.host[*].app[2].replyLength            = 1B*int(truncnormal(800000,200000))
*.isp_private0.private.host[*].app[2].numRequestsPerSession  = intuniform(5,20)
*.isp_private0.private.host[*].app[2].thinkTime              = exponential(5s)
*.isp_private0.private.host[*].app[2].idleInterval           = exponential(60s)
*.isp_private0.private.host[*].app[2].startTime              = uniform(60s,150s)

*.isp_private0.private.host[*].app[3].typename               = "TcpBasicClientApp"
*.isp_private0.private.host[*].app[3].connectAddress         = "cloud.webServer"
*.isp_private0.private.host[*].app[3].connectPort            = 443
*.isp_private0.private.host[*].app[3].requestLength          = 400B
*.isp_private0.private.host[*].app[3].replyLength            = 1B*int(truncnormal(5000,1000))
*.isp_private0.private.host[*].app[3].numRequestsPerSession  = intuniform(10,40)
*.isp_private0.private.host[*].app[3].thinkTime              = exponential(2s)
*.isp_private0.private.host[*].app[3].idleInterval           = exponential(5s)
*.isp_private0.private.host[*].app[3].startTime              = uniform(60s,150s)

# Attacker starts silent — scenario XML enables it
*.isp_private0.private.attacker.numApps = 0